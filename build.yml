name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13
    steps:
    - uses: actions/checkout@v3
    - name: Install Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    - run: npm install
    - run: npm install @capacitor/core @capacitor/ios @capacitor/cli
    - run: npx cap sync ios
    - name: Build Xcode project
      run: |
        cd ios/App
        xcodebuild -scheme App -configuration Debug -destination 'generic/platform=iOS Simulator' build CODE_SIGNING_ALLOWED=NO
    - name: Create IPA
      run: |
        cd ios/App/build/Debug-iphonesimulator
        mkdir -p Payload
        cp -r App.app Payload/
        zip -r ../../../duowei-app.ipa Payload
    - uses: actions/upload-artifact@v3
      with:
        name: duowei-app-ipa
        path: ios/App/duowei-app.ipa